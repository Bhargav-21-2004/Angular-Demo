<div class="container">
    <form class="w-75 p-5 mt-5 mx-auto bg-info" [formGroup]="addUserForm" (ngSubmit)="onSubmit()"> 
    <h2 class="text-center w-75 mt-2 mx-auto m-4 ">Add user</h2>

    <div class="form-group m-3">
        <label class="form-label">Name : </label>
        <input type="text" class="form-control" placeholder="Enter the Name" formControlName="name">
    </div>

    <div class="form-group m-3">
        <label class="form-label">UserName : </label>
        <input type="text" class="form-control" placeholder="Enter the UserName" formControlName="username">
    </div>

    <div class="form-group m-3">
        <label class="form-label">Email :</label>
        <input type="text" class="form-control" placeholder="Enter the Name" formControlName="email">
    </div>

    <div class="text-center m-3">
        <button class="btn btn-success btn-lg m-1">Add</button>
        <button class="btn btn-success btn-lg m-1" (click)="onCancel()">Cancel</button>
    </div>
    </form>
</div>
